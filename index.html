<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Arjun Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px),
                              linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden;
        }

        #mainContent { display: none; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        h2 { color: #d63384; font-size: 1.4rem; margin-bottom: 20px; line-height: 1.4; }

        .image-container img {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        #okBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #6c757d; color: white; position: absolute; transition: 0.1s; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="mainContent">
        
        <div id="screen1" class="card">
            <h2>Chal chikknee, Photo Bhej 🔫</h2>
            <div class="image-container">
                <img src="https://media.tenor.com/On7V4_S3m_IAAAAC/cat-stick-up.gif" alt="Gun Cat">
            </div>
            <div class="btn-group">
                <button id="okBtn" onclick="nextScreen()">Ok</button>
                <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>

        <div id="screen2" class="card hidden">
            <h2>Please na... Ahaa 🥺 appa appa</h2>
            <div class="image-container">
                <img src="https://media.tenor.com/XAS-pY-q694AAAAM/mochi-peach.gif" alt="Please">
            </div>
            <button id="okBtn" onclick="finalScreen()">Thike yrr</button>
        </div>

        <div id="finalScreen" class="card hidden">
            <h2>Thank u zii 😁🌚</h2>
            <div class="image-container">
                <img src="https://media.tenor.com/En9S_pUat9kAAAAM/cony-line.gif" alt="Happy">
            </div>
        </div>

    </div>

    <script>
        // 1. PASSWORD & BACK-BUTTON TRAP
        (function() {
            const password = prompt("Enter the Secret Password:");
            if (password === "Madara chuchiha") {
                document.getElementById('mainContent').style.display = 'block';
                
                // The Back-Button Trap: Push state to block easy exit
                window.history.pushState(null, null, window.location.href);
                window.onpopstate = function() {
                    window.history.pushState(null, null, window.location.href);
                    alert("No escape until you finish! 😂");
                };
            } else {
                alert("Wrong Password.");
                document.body.innerHTML = "<h1>403 Forbidden</h1>";
            }
        })();

        // 2. INTERACTION LOGIC
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            // Move within a safe range of the screen
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function nextScreen() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }

        function finalScreen() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('finalScreen').classList.remove('hidden');
            // Optional: Release the back button trap at the end
            window.onpopstate = null; 
        }
    </script>
</body>
</html>
