<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P + G Forever</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            width: 80%;
            max-width: 600px;
            position: relative;
        }
        .label-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
            color: #d63384;
            pointer-events: none; /* Allows clicks to pass through to the chart */
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="heartChart"></canvas>
        <div class="label-overlay">Pramangsu + Gaytri</div>
    </div>

    <script>
        const ctx = document.getElementById('heartChart').getContext('2d');
        
        // Generate data points for the heart
        const dataPoints = [];
        for (let t = 0; t <= 2 * Math.PI; t += 0.01) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            dataPoints.push({x: x, y: y});
        }

        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Love Equation',
                    data: dataPoints,
                    showLine: true,
                    borderColor: '#ff4d6d',
                    backgroundColor: 'rgba(255, 77, 109, 0.2)',
                    borderWidth: 3,
                    pointRadius: 0, // Hides the individual dots for a smooth line
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { display: false }, // Hides the grid lines
                    y: { display: false }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
