<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satvik Transit Matrix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; }
        #canvas3d { width: 100%; height: 100%; display: block; }
        
        /* Interactive HUD Overlay Layer */
        .hud-header { position: absolute; top: 24px; left: 24px; z-index: 10; font-family: monospace; color: #00ff66; pointer-events: none; }
        .hud-header h1 { margin: 0; fontSize: 20px; letter-spacing: 3px; }
        .hud-header p { opacity: 0.6; font-size: 11px; margin: 4px 0 0 0; }
        
        .hud-terminal { position: absolute; bottom: 24px; right: 24px; z-index: 10; font-family: monospace; color: #ffffff; background: rgba(0, 255, 102, 0.05); padding: 16px; border-radius: 4px; border: 1px solid #00ff66; max-width: 280px; }
        .hud-terminal p { margin: 0 0 8px 0; font-size: 12px; color: #00ff66; font-weight: bold; }
        .hud-terminal select { width: 100%; background: #000; color: #00ff66; border: 1px solid #00ff66; padding: 6px; fontFamily: monospace; outline: none; cursor: pointer; }
    </style>
    <!-- Import the exact 3D Game Engine Drivers directly via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <!-- HUD Overlay Panels mapping your exact system data -->
    <div class="hud-header">
        <h1>SATVIK TRANSIT MATRIX</h1>
        <p>FOUNDER: PRAMANGSU ACHARJEE | CHEF: SWAPAN ACHARJEE</p>
        <p>SYSTEM CORDS: 6001299901 | EMAIL: pramangsuacharjee883@gmail.com</p>
    </div>

    <div class="hud-terminal">
        <p>LOGISTICS INTERCEPT TERMINAL</p>
        <span style="font-size: 11px; display: block; margin-bottom: 4px;">SELECT SECTOR INTERCEPT:</span>
        <select>
            <option>LANKA STATION (LNK)</option>
            <option>HOJAI STATION (HJI)</option>
        </select>
        <div style="margin-top: 12px; border-top: 1px dashed #00ff66; padding-top: 8px; font-size: 10px; color: #a0a0a0;">
            *Drag workspace to engage parallax momentum engine shifts.
        </div>
    </div>

    <!-- The 3D Render Canvas Viewport Container -->
    <div id="canvas3d"></div>

    <script>
        // Initialize the Three.js 3D Virtual Universe Context
        const container = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 1.8;
        controls.minPolarAngle = Math.PI / 2.5;

        // Lighting Engine Matrix
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00ff66, 1.5, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 1. THE PARTICLES GALAXY INTERFACE SECTOR (Swirling Cosmic Vortex)
        const particleCount = 10000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for(let i = 0; i < particleCount; i++) {
            const r = Math.pow(Math.random(), 2) * 12; 
            const theta = i * 0.025 + Math.random() * 0.4;
            positions[i * 3] = Math.cos(theta) * r;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
            positions[i * 3 + 2] = Math.sin(theta) * r;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            color: 0x00ff66,
            size: 0.04,
            transparent: true,
            opacity: 0.85,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 2. BACKDROP AMBIENT STARFIELD
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(2000 * 3);
        for(let i=0; i<6000; i++) {
            starPositions[i] = (Math.random() - 0.5) * 100;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // 3. CENTRAL MATRIX GEOMETRY ANCHOR (Replacing Typography Complexities)
        const coreGeo = new THREE.IcosahedronGeometry(1.2, 2);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.15 });
        const coreMesh = new THREE.Mesh(coreGeo, coreMat);
        scene.add(coreMesh);

        // 4. FIXED PRICE INTERCEPT MENU CLUSTERS (Floating 3D Interaction Points)
        const menuItems = [
            { text: "Artisan Bread: ₹35", pos: [-4, 2, -2] },
            { text: "Satvik Upma: ₹60", pos: [-4, -1, 1] },
            { text: "Poha Fusion: ₹60", pos: [4, 2, -1] },
            { text: "Puri Sabji: ₹80", pos: [4, -1, 2] },
            { text: "Gourmet Thali (Lunch): ₹120", pos: [0, 3, -4] },
            { text: "Gourmet Thali (Dinner): ₹120", pos: [0, -3, -3] }
        ];

        const floatingGroups = [];

        // Dynamic 3D canvas HTML layout injectors
        menuItems.forEach((item) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0, 0, 512, 128);
            ctx.font = 'bold 32px monospace';
            ctx.fillStyle = '#00ff66';
            ctx.textAlign = 'center';
            ctx.fillText(item.text, 256, 64);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(item.pos[0], item.pos[1], item.pos[2]);
            sprite.scale.set(4, 1, 1);
            
            scene.add(sprite);
            floatingGroups.push({ obj: sprite, baseTargetY: item.pos[1], seed: Math.random() * 10 });
        });

        // 5. THE REAL-TIME GRAPHICS RENDERING LOOP (Parallax Execution Animation Frame)
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Rotates the galaxy exactly like the reference clips
            particleSystem.rotation.y = elapsedTime * 0.05;
            coreMesh.rotation.y = elapsedTime * 0.1;
            coreMesh.rotation.x = elapsedTime * 0.05;

            // Applies the zero-gravity wavy float calculation to the prices
            floatingGroups.forEach((group) => {
                group.obj.position.y = group.baseTargetY + Math.sin(elapsedTime * 1.5 + group.seed) * 0.15;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Responsive Engine Auto-Resizer 
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
