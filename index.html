<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pramangsu + Arjun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --grid-color: #e0e0e0;
            --heart-color: #ff4d6d;
            --text-color: #c9184a;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            /* This creates the graph paper effect background */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            width: 90vw;
            max-width: 600px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        /* The Heart Shape */
        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(255, 77, 109, 0.3));
        }

        .heart-path {
            fill: rgba(255, 77, 109, 0.05);
            stroke: var(--heart-color);
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        /* The Centered Names */
        .names {
            position: absolute;
            top: 45%; /* Adjusted for visual center of the heart */
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .names p {
            margin: 0;
            padding: 0;
            font-size: clamp(1.5rem, 5vw, 3rem); /* Responsive text size */
            color: var(--text-color);
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .plus-sign {
            font-size: 2rem;
            display: block;
            margin: 10px 0;
        }

        /* Subtle floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path class="heart-path" d="M 50,30 
                  A 20,20 0,0,0 10,50 
                  C 10,80 50,100 50,100 
                  C 50,100 90,80 90,50 
                  A 20,20 0,0,0 50,30 Z" />
        </svg>

        <div class="names">
            <p>Pramangsu</p>
            <span class="plus-sign" style="color: #ff4d6d;">+</span>
            <p>Arjun</p>
        </div>
    </div>

</body>
</html>
