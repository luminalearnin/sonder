<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pramangsu + Arjun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* White background to match the paper */
            font-family: 'Poppins', sans-serif;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 500px; /* Limits the size so it looks good on desktop too */
        }

        .background-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px; /* Optional: rounds the corners of your image */
        }

        .text-overlay {
            position: absolute;
            /* This centers the text container exactly in the middle of the image */
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            pointer-events: none; /* Makes sure the text doesn't interfere with clicking */
        }

        .name {
            font-size: clamp(1.8rem, 7vw, 2.5rem); /* Scales text based on screen size */
            color: #d63384; /* Deep pink color */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
        }

        .plus {
            font-size: 1.8rem;
            color: #ff4d6d;
            margin: 5px 0;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="1769602656377.png" alt="Graph" class="background-image">

        <div class="text-overlay">
            <div class="name">Pramangsu</div>
            <span class="plus">+</span>
            <div class="name">Arjun</div>
        </div>
    </div>

</body>
</html>
