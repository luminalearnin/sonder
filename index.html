<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P + A</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Black background around the image */
            font-family: 'Poppins', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Adjust this to make the image bigger/smaller */
            line-height: 0;
        }

        /* This displays the actual image you uploaded */
        .background-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            line-height: 1.2;
        }

        .name {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #d63384; /* Pinkish color */
            margin: 0;
            text-transform: uppercase;
        }

        .plus {
            font-size: clamp(1.5rem, 6vw, 3rem);
            color: #ff4d6d;
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="graph.jpg" alt="Graph Background" class="background-image">

        <div class="text-overlay">
            <div class="name">Pramangsu</div>
            <div class="plus">+</div>
            <div class="name">Arjun</div>
        </div>
    </div>

</body>
</html>
