<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pramangsu + Gayatri</title>
    <style>
        /* 1. Basic Setup */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Takes full viewport height */
            margin: 0;
            background-color: #fff8f8; /* Soft pinkish-white background */
            overflow: hidden; /* Optional: hides scrollbars for a clean look */
            font-family: 'Poppins', sans-serif; /* Use a modern, romantic font (see below) */
        }

        /* 2. Style the SVG Container */
        .svg-container {
            width: 80vw; /* Takes 80% of viewport width */
            max-width: 800px; /* Capped at 800px width so it doesn't get crazy on huge monitors */
            aspect-ratio: 1 / 1; /* Maintains a perfect square aspect ratio */
        }

        /* 3. Style the heart shape itself */
        .heart-path {
            fill: none; /* Make it transparent inside */
            stroke: #d63384; /* Deep, rich pink color */
            stroke-width: 1.5; /* Line thickness */
        }

        /* 4. Style the text within the SVG */
        .heart-text {
            fill: #c2185b; /* A darker, punchier text color */
            font-size: 8px; /* Standard text size (relative to the SVG viewbox, not the screen) */
            font-weight: bold;
            text-anchor: middle; /* Centers each line of text relative to its X coordinate */
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="svg-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            
            <path class="heart-path" d="M 50,20
                  A 20,20 0,0,0 20,40
                  Q 20,60 50,90
                  Q 80,60 80,40
                  A 20,20 0,0,0 50,20 Z" />

            <text x="50" y="50" class="heart-text">
                <tspan x="50" dy="-11">Pramangsu</tspan>
                <tspan x="50" dy="11">+</tspan>
                <tspan x="50" dy="11">Gayatri</tspan>
            </text>
        </svg>
    </div>

</body>
</html>
